# Um comando para subir a API: docker-compose up
# Requer .env na raiz (OPENAI_API_KEY e opcional GOOGLE_APPLICATION_CREDENTIALS)
# No Docker, use GOOGLE_APPLICATION_CREDENTIALS=/app/keys/seu-arquivo.json e coloque o JSON em keys/
services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./keys:/app/keys:ro
    restart: unless-stopped
